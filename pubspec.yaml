name: cyclone_app
description: Cyclone AI Logic - Professional Flutter App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0

  # Image handling
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # UI
  glassmorphism: ^3.0.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  lottie: ^3.0.0
  smooth_page_indicator: ^1.1.0
  photo_view: ^0.14.0

  # Utils
  shared_preferences: ^2.2.2
  permission_handler: ^11.2.0
  file_picker: ^6.1.1
  uuid: ^4.3.3
  intl: ^0.19.0

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
